name: Daily Auto Commit

on:
  schedule:
    # รันอัตโนมัติทุกๆ 4 ชั่วโมง (ที่นาทีที่ 0 ของชั่วโมงที่ 0, 4, 8, 12, 16, 20 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # ปุ่มกดรันเองมือถือ/เว็บบราวเซอร์

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update streak file
        run: |
          echo "Last active: $(date)" > streak.txt

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "zeetosit@gmail.com"
          git add streak.txt
          git commit -m "chore: auto streak update" || exit 0
          git push
